<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',Arial;
  min-height:100vh;
  background: radial-gradient(circle at 20% 30%, #38bdf8 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, #6366f1 0%, transparent 40%),
              linear-gradient(135deg,#0f172a,#1e3a8a);
}

/* LOGIN */
#login{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-card{
  background:white;
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}

.login-input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#eef6f9;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SUCCESS */
#success{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.check{
  width:100px;height:100px;
  border-radius:50%;
  background:#22c55e;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:50px;
  animation:pop 0.4s ease;
}

@keyframes pop{
  from{transform:scale(0)}
  to{transform:scale(1)}
}

/* APP */
.container{
  display:none;
  padding:20px;
  color:white;
  max-width:520px;
  margin:auto;
}

.form-box{
  background:rgba(255,255,255,0.12);
  padding:20px;
  border-radius:15px;
}

select,input:not(.login-input){
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

.btn-primary{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.quick{display:flex;gap:10px;margin-top:10px}
.quick button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
}

.card{
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

.tabs{display:flex;gap:5px;margin-top:15px}
.tab-btn{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#475569;
  color:white;
}
.tab-btn.active{background:white;color:black}

.tab-content{display:none}
.tab-content.active{display:block}

.hidden{display:none}
pre{white-space:pre-wrap}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h2>🦷 Dental App</h2>
    <input id="user" class="login-input" placeholder="Username">
    <input id="pass" type="password" class="login-input" placeholder="Password">
    <button class="btn" onclick="login()">Masuk</button>
    <div id="error" style="color:red;margin-top:5px;"></div>
  </div>
</div>

<!-- SUCCESS -->
<div id="success">
  <div class="check">✔</div>
</div>

<!-- APP -->
<div class="container" id="app">

<h3>Halo Dokter 👋</h3>

<div class="form-box">

<label>Mode</label>
<select id="mode" onchange="toggleBB()">
<option value="dewasa">Dewasa</option>
<option value="anak">Anak</option>
</select>

<input id="bb" class="hidden" placeholder="Berat badan (kg)">

<label>Kategori</label>
<select id="kategori" onchange="loadObat()">
<option value="analgesik">Analgesik</option>
<option value="antibiotik">Antibiotik</option>
<option value="lain">Lain</option>
</select>

<label>Obat</label>
<select id="obat"></select>

<button class="btn-primary" onclick="run()">PROSES</button>

<div class="quick">
<button onclick="copyResep()">📋 Salin</button>
<button onclick="resetForm()">🔄 Reset</button>
</div>

</div>

<div id="out"></div>
<footer id="copyright" style="
text-align:center;
font-size:12px;
color:#e2e8f0;
margin-top:40px;
padding:20px 0;
opacity:0.7;
border-top:1px solid rgba(255,255,255,0.1);
"></footer>

</div>

<script>

const users=[
{username:"dokter",password:"dokter24"},
{username:"admin",password:"klinik24"},
{username:"asisten",password:"babu24"}
];

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  let found=users.find(x=>x.username===u && x.password===p);

  if(found){
    document.getElementById("success").style.display="flex";

    setTimeout(()=>{
      document.getElementById("success").style.display="none";
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";
      loadObat();
    },800);

  }else{
    document.getElementById("error").innerText="Username / Password salah";
  }
}

function toggleBB(){
  let mode=document.getElementById("mode").value;
  let bb=document.getElementById("bb");
  mode==="anak"?bb.classList.remove("hidden"):bb.classList.add("hidden");
}

const data={
analgesik:["Paracetamol","Ibuprofen","Mefenamic Acid","Diclofenac K","Ketorolac","Tramadol"],
antibiotik:["Amoxicillin","Amoxiclav","Cefadroxil","Cefixime","Clindamycin","Metronidazole","Azithromycin"],
lain:["Metylprednisolone","Omeprazole"]
};

function loadObat(){
  let kategori=document.getElementById("kategori").value;
  let select=document.getElementById("obat");
  select.innerHTML="";
  data[kategori].forEach(o=>{
    let opt=document.createElement("option");
    opt.text=o;
    select.add(opt);
  });
}

let currentResep="";

function run(){
  let mode=document.getElementById("mode").value;
  let bb=parseFloat(document.getElementById("bb").value||0);
  let obat=document.getElementById("obat").value;

  let dosis="",resep="",indikasi="",kontra="",merk="",kie="";

  const dewasa={
    "Paracetamol":["500 mg 3-4x","R/ Paracetamol 500 mg\nS: 3 dd 1","Nyeri ringan","Hati","Sanmol","Boleh sebelum/sesudah makan"],
    "Ibuprofen":["400 mg 3x","R/ Ibuprofen 400 mg\nS: 3 dd 1 p.c","Inflamasi","Gastritis","Proris","Setelah makan"],
    "Mefenamic Acid":["500 mg 3x","R/ Mefenamic acid 500 mg\nS: 3 dd 1","Nyeri sedang","Gastritis","Ponstan","Jangan saat perut kosong"],
    "Diclofenac K":["50 mg 2-3x","R/ Diclofenac K 50 mg\nS: 2 dd 1","Nyeri kuat","Ulkus","Cataflam","Setelah makan"],
    "Ketorolac":["10 mg 3x","R/ Ketorolac 10 mg\nS: 3 dd 1","Nyeri berat","Ginjal","Toradol","Max 5 hari"],
    "Tramadol":["50 mg 2-3x","R/ Tramadol 50 mg\nS: 2 dd 1","Nyeri berat","Ketergantungan","Tramal","Mengantuk"],
    "Amoxicillin":["500 mg 3x","R/ Amoxicillin 500 mg\nS: 3 dd 1","Infeksi","Alergi","Amoxil","Habiskan"],
    "Amoxiclav":["625 mg 3x","R/ Amoxiclav 625 mg\nS: 3 dd 1","Infeksi berat","Alergi","Augmentin","Setelah makan"],
    "Cefadroxil":["500 mg 2x","R/ Cefadroxil 500 mg\nS: 2 dd 1","Infeksi","Alergi","Duricef","Habiskan"],
    "Cefixime":["200 mg 2x","R/ Cefixime 200 mg\nS: 2 dd 1","Infeksi berat","Alergi","Suprax","Habiskan"],
    "Clindamycin":["300 mg 3x","R/ Clindamycin 300 mg\nS: 3 dd 1","Alergi penisilin","Diare","Dalacin","Stop jika diare"],
    "Metronidazole":["500 mg 3x","R/ Metronidazole 500 mg\nS: 3 dd 1","Anaerob","Alkohol","Flagyl","Tidak boleh alkohol"],
    "Azithromycin":["500 mg 1x","R/ Azithromycin 500 mg\nS: 1 dd 1","Alternatif","Hati","Zithromax","Sebelum makan"],
    "Metylprednisolone":["4 mg 3x","R/ Metylprednisolone 4 mg\nS: 3 dd 1","Inflamasi","Infeksi aktif","Medrol","Jangka pendek"],
    "Omeprazole":["20 mg 1x","R/ Omeprazole 20 mg\nS: 1 dd 1 a.c","Gastritis","Hipersensitif","Losec","Sebelum makan"]
  };

  const anak={
    "Paracetamol":[(bb*0.5).toFixed(1)+" mL","R/ Paracetamol syr\nS: 3 dd "+(bb*0.5).toFixed(1)+" mL","Demam","Hati","Sanmol Syr",""],
    "Ibuprofen":[(bb*0.25).toFixed(1)+" mL","R/ Ibuprofen syr\nS: 3 dd "+(bb*0.25).toFixed(1)+" mL","Nyeri","Gastritis","Proris Syr","Setelah makan"],
    "Amoxicillin":[(bb*0.4).toFixed(1)+" mL","R/ Amoxicillin syr\nS: 3 dd "+(bb*0.4).toFixed(1)+" mL","Infeksi","Alergi","Amoxil Syr","Habiskan"],
    "Cefadroxil":[(bb*0.6).toFixed(1)+" mL","R/ Cefadroxil syr\nS: 2 dd "+(bb*0.6).toFixed(1)+" mL","Infeksi","Alergi","Duricef Syr","Habiskan"],
    "Metronidazole":[(bb*0.3).toFixed(1)+" mL","R/ Metronidazole syr\nS: 3 dd "+(bb*0.3).toFixed(1)+" mL","Anaerob","Alkohol","Flagyl Syr","Hindari alkohol"]
  };

  if(mode==="dewasa" && dewasa[obat]){
    [dosis,resep,indikasi,kontra,merk,kie]=dewasa[obat];
  }else if(mode==="anak" && anak[obat]){
    [dosis,resep,indikasi,kontra,merk,kie]=anak[obat];
  }else{
    dosis="-";resep="-";
  }

  currentResep=resep;

  document.getElementById("out").innerHTML=`
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab(event,'dosis')">Dosis</button>
    <button class="tab-btn" onclick="showTab(event,'resep')">Resep</button>
    <button class="tab-btn" onclick="showTab(event,'kie')">KIE</button>
    <button class="tab-btn" onclick="showTab(event,'info')">Info</button>
  </div>

  <div id="tab-dosis" class="tab-content active">
    <div class="card"><b>Dosis:</b><br>${dosis}</div>
  </div>

  <div id="tab-resep" class="tab-content">
    <div class="card"><pre>${resep}</pre></div>
  </div>

  <div id="tab-kie" class="tab-content">
    <div class="card">${kie}</div>
  </div>

  <div id="tab-info" class="tab-content">
    <div class="card">Indikasi: ${indikasi}</div>
    <div class="card">Kontra: ${kontra}</div>
    <div class="card">Merk: ${merk}</div>
  </div>
  `;
}

function showTab(e,tab){
  document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  e.target.classList.add("active");
}

function copyResep(){
  if(!currentResep){
    alert("Belum ada resep");
    return;
  }
  navigator.clipboard.writeText(currentResep);
  alert("Tersalin!");
}

function resetForm(){
  document.getElementById("bb").value="";
  document.getElementById("out").innerHTML="";
  currentResep="";
}

</script>
<script>
window.onload = function(){
  checkLogin();

  // copyright auto
  const el = document.getElementById("copyright");
  if(el){
    el.innerText = "© " + new Date().getFullYear() + " Dental App • Developed by Ale Saputra";
  }
};
</script>
</body>
</html>
