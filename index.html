<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panduan resep dokter</title>

<style>
:root {
  --space-xs: 6px;
  --space-sm: 10px;
  --space-md: 16px;
  --space-lg: 22px;
}
body {
  font-family: Arial;
  padding:15px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
  min-height:100vh;
}
.container {
  max-width:520px;
  margin:auto;
  color:white;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
h2 {
  text-align:center;
  color:white;
}
select,input {
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  font-size:15px;
  border:none;
  outline:none;

  background: rgba(255,255,255,0.95);
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  font-size:15px;
  border:none;

  background: linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
  font-weight:bold;
  cursor:pointer;

  transition: all 0.2s ease;
}
button:hover {
  transform: scale(1.05);
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
button:active {
  transform: scale(0.97);
}
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  color:#111; /* 🔥 INI SOLUSI */
}
.blue{border-left:6px solid #007bff;}
.green{border-left:6px solid #28a745;}
.red{border-left:6px solid #dc3545;}
.orange{border-left:6px solid orange;}
.hidden{display:none;}
pre{white-space:pre-wrap;}
label {
  font-size:13px;
  margin-top:10px;
  display:block;
  color:#e2e8f0;
}
#popup div {
  animation: fadeIn 0.3s ease;
}
.logout-btn {
  position:absolute;
  top:15px;
  right:15px;

  background:#ef4444;
  color:white;
  padding:6px 12px;
  border:none;
  border-radius:8px;

  font-size:12px;
  width:auto; /* 🔥 penting biar tidak full */
  cursor:pointer;
}

.logout-btn:hover {
  background:#dc2626;
}
  label {
  font-size:13px;
  margin-top:10px;
  display:block;
  color:#e2e8f0;
}

.form-group {
  margin-bottom: var(--space-md);
}
  label {
  display:block;
  font-size:13px;
  margin-bottom: var(--space-xs);
  color:#e2e8f0;
}
.form-box {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  padding: var(--space-lg);
  border-radius:16px;
  margin-top:15px;
}
@keyframes fadeIn {
  from {opacity:0; transform:scale(0.8);}
  to {opacity:1; transform:scale(1);}
}
  .card {
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from {
    opacity:0;
    transform:translateY(15px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
  button {
  margin-top: var(--space-sm);
}
  #out {
  margin-top: var(--space-lg);
}
.logout-btn {
  background:#ef4444;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  margin-bottom: var(--space-sm);
}
  input, select {
  width:100%;
  height:46px;
  padding:0 14px;

  border-radius:12px;
  border:none;
  outline:none;

  font-size:14px;
  background:#f1f5f9;

  transition:0.2s;
}

input:focus, select:focus {
  background:white;
  box-shadow:0 0 0 2px #38bdf8;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login" style="
display:flex;
height:100vh;
justify-content:center;
align-items:center;
background: linear-gradient(135deg, #0f172a, #1e3a8a);
position:fixed;
top:0;left:0;width:100%;
z-index:9999;
">

<div style="
background: rgba(255,255,255,0.1);
backdrop-filter: blur(12px);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
width:260px;
color:white;
">

<h2>🔐 Dental App</h2>

<input type="text" id="user" placeholder="Username"
style="padding:12px;margin:10px;border-radius:10px;border:none;width:220px;">

<input type="password" id="pass" placeholder="Password"
style="padding:12px;margin:10px;border-radius:10px;border:none;width:220px;">

<label style="font-size:13px;">
  <input type="checkbox" id="remember"> Login 24 jam
</label>

<div style="font-size:11px; color:#cbd5f5; margin-top:4px;">
  Akan tetap login selama 24 jam. Jika tidak dicentang, akan logout otomatis setelah 10 menit tidak aktif.
</div>
</label>
  
<div id="error" style="color:red;"></div>
<button onclick="login()" style="
margin-top:12px;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
width:100%;
font-weight:bold;
">
Masuk
</button>

</div>
</div>

<div class="container">
<h2 style="letter-spacing:1px;">🦷 Dentale Smart Resep</h2>
<p style="text-align:center; font-size:12px; opacity:0.7;">
  Sistem bantu resep cepat & praktis
</p>
  <div class="form-box">
<div style="display:flex; justify-content:flex-end;">
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<label>Mode Pasien</label>
<select id="mode" onchange="toggleBB()">
<option value="dewasa">Dewasa</option>
<option value="anak">Anak</option>
</select>

<div class="form-group">
  <label>Berat Badan (Mode Pasien Anak)</label>
  <input id="bb" class="hidden" placeholder="Contoh: 20 (Kg)">
</div>

<label>Kategori Obat</label>
<select id="kategori">
<option value="analgesik">Analgesik</option>
<option value="antibiotik">Antibiotik</option>
<option value="lain">Lain-lain</option>
</select>

<label>Pilih Obat</label>
<select id="obat"></select>

<button onclick="run()">PROSES</button>

<div id="out"></div>
</div>

<script>

const data = {
analgesik: ["Paracetamol","Ibuprofen","Mefenamic Acid","Diclofenac K","Ketorolac","Tramadol"],
antibiotik: ["Amoxicillin","Amoxiclav","Cefadroxil","Cefixime","Clindamycin","Metronidazole","Azithromycin"],
lain: ["Metylprednisolone","Omeprazole"]
};

function toggleBB(){
let mode=document.getElementById("mode").value;
let bb=document.getElementById("bb");
mode=="anak" ? bb.classList.remove("hidden") : bb.classList.add("hidden");
}

function loadObat(){
let kat=document.getElementById("kategori").value;
let select=document.getElementById("obat");
select.innerHTML="";
data[kat].forEach(o=>{
let opt=document.createElement("option");
opt.text=o;
select.add(opt);
});
}

document.getElementById("kategori").addEventListener("change",loadObat);

function run(){

let mode=document.getElementById("mode").value;
let bb=parseFloat(document.getElementById("bb").value || 0);
let obat=document.getElementById("obat").value;

let dosis="",resep="",indikasi="",kontra="",merk="",kie="";

// ================= DEWASA =================
const dewasa = {
"Paracetamol":["500 mg 3-4x","R/ Paracetamol 500 mg\nS: 3 dd 1","Nyeri ringan","Hati","Sanmol","Boleh sebelum/sesudah makan"],
"Ibuprofen":["400 mg 3x","R/ Ibuprofen 400 mg\nS: 3 dd 1 p.c","Inflamasi","Gastritis","Proris","Setelah makan"],
"Mefenamic Acid":["500 mg 3x","R/ Mefenamic acid 500 mg\nS: 3 dd 1","Nyeri sedang","Gastritis","Ponstan","Jangan saat perut kosong"],
"Diclofenac K":["50 mg 2-3x","R/ Diclofenac K 50 mg\nS: 2 dd 1","Nyeri kuat","Ulkus","Cataflam","Setelah makan"],
"Ketorolac":["10 mg 3x","R/ Ketorolac 10 mg\nS: 3 dd 1","Nyeri berat","Ginjal","Toradol","Max 5 hari"],
"Tramadol":["50 mg 2-3x","R/ Tramadol 50 mg\nS: 2 dd 1","Nyeri berat","Ketergantungan","Tramal","Mengantuk"],

"Amoxicillin":["500 mg 3x","R/ Amoxicillin 500 mg\nS: 3 dd 1","Infeksi","Alergi","Amoxil","Habiskan"],
"Amoxiclav":["625 mg 3x","R/ Amoxiclav 625 mg\nS: 3 dd 1","Infeksi berat","Alergi","Augmentin","Setelah makan"],
"Cefadroxil":["500 mg 2x","R/ Cefadroxil 500 mg\nS: 2 dd 1","Infeksi","Alergi","Duricef","Habiskan"],
"Cefixime":["200 mg 2x","R/ Cefixime 200 mg\nS: 2 dd 1","Infeksi berat","Alergi","Suprax","Habiskan"],
"Clindamycin":["300 mg 3x","R/ Clindamycin 300 mg\nS: 3 dd 1","Alergi penisilin","Diare","Dalacin","Stop jika diare"],
"Metronidazole":["500 mg 3x","R/ Metronidazole 500 mg\nS: 3 dd 1","Anaerob","Alkohol","Flagyl","Tidak boleh alkohol"],
"Azithromycin":["500 mg 1x","R/ Azithromycin 500 mg\nS: 1 dd 1","Alternatif","Hati","Zithromax","Sebelum makan"],

"Metylprednisolone":["4 mg 3x","R/ Metylprednisolone 4 mg\nS: 3 dd 1","Inflamasi","Infeksi aktif","Medrol","Jangka pendek"],
"Omeprazole":["20 mg 1x","R/ Omeprazole 20 mg\nS: 1 dd 1 a.c","Gastritis","Hipersensitif","Losec","Sebelum makan"]
};

// ================= ANAK =================
const maxBB = 40;

if(mode=="anak" && bb>0){

let w = bb>maxBB ? maxBB : bb;
let over = bb>maxBB;

const anak = {
"Paracetamol":[(w*0.5).toFixed(1)+" mL","R/ Paracetamol syr\nS: 3 dd "+(w*0.5).toFixed(1)+" mL","Demam","Hati","Sanmol Syr",""],
"Ibuprofen":[(w*0.25).toFixed(1)+" mL","R/ Ibuprofen syr\nS: 3 dd "+(w*0.25).toFixed(1)+" mL","Nyeri","Gastritis","Proris Syr","Setelah makan"],
"Amoxicillin":[(w*0.4).toFixed(1)+" mL","R/ Amoxicillin syr\nS: 3 dd "+(w*0.4).toFixed(1)+" mL","Infeksi","Alergi","Amoxil Syr","Habiskan"],
"Cefadroxil":[(w*0.6).toFixed(1)+" mL","R/ Cefadroxil syr\nS: 2 dd "+(w*0.6).toFixed(1)+" mL","Infeksi","Alergi","Duricef Syr","Habiskan"],
"Metronidazole":[(w*0.3).toFixed(1)+" mL","R/ Metronidazole syr\nS: 3 dd "+(w*0.3).toFixed(1)+" mL","Anaerob","Alkohol","Flagyl Syr","Hindari alkohol"]
};

if(anak[obat]){
[dosis,resep,indikasi,kontra,merk,kie]=anak[obat];
if(over) kie="BB > 40 kg → gunakan dosis maksimal anak";
}else{
dosis="-"; resep="-"; indikasi="-"; kontra="-"; merk="-"; kie="Tidak dianjurkan untuk anak";
}

}

// ================= PILIH =================
if(mode=="dewasa" && dewasa[obat]){
[dosis,resep,indikasi,kontra,merk,kie]=dewasa[obat];
}

// OUTPUT
document.getElementById("out").innerHTML=`
<div class="card blue"><b>Dosis:</b><br>${dosis}</div>
<div class="card green"><b>Resep:</b><pre>${resep}</pre></div>
<div class="card green"><b>Indikasi:</b><br>${indikasi}</div>
<div class="card red"><b>Kontraindikasi:</b><br>${kontra}</div>
<div class="card orange"><b>Merk:</b><br>${merk}</div>
<div class="card blue"><b>NB (KIE):</b><br>${kie}</div>
`;

}

</script>
 <div id="popup" style="
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
">

  <div style="
  background:white;
  padding:25px;
  border-radius:16px;
  text-align:center;
  width:280px;
  ">

    <h3>⏰ Session Expired</h3>
    <p>Silakan login kembali</p>

    <button onclick="closePopup()" style="
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:10px;
    ">
      OK
    </button>

  </div>
</div>

<script>
  let idleTimer;

function startIdleTimer(){
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    logout();
    showPopup();
  }, 10 * 60 * 1000); // 10 menit
}

function stopIdleTimer(){
  clearTimeout(idleTimer);
}
window.onload = function(){
  toggleBB();
  loadObat();

  let isLogin = localStorage.getItem("login");
  let loginTime = localStorage.getItem("loginTime");

  if(isLogin === "true" && loginTime){
    let now = new Date().getTime();
    let diff = now - loginTime;

    let batas = 24 * 60 * 60 * 1000;

    if(diff < batas){
      document.getElementById("login").style.display = "none";
    } else {
      localStorage.removeItem("login");
      localStorage.removeItem("loginTime");
      document.getElementById("login").style.display = "flex";
      showPopup();
    }
  }

  if(sessionStorage.getItem("login") === "true"){
    document.getElementById("login").style.display = "none";
    startIdleTimer(); // 🔥 aktifkan lagi setelah refresh
  }
};

const users = [
  {username: "dokter", password: "dokter24"},
  {username: "admin", password: "klinik24"},
  {username: "asisten", password: "babu24"}
];

function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;
  let remember = document.getElementById("remember").checked;

  let found = users.find(u => u.username === user && u.password === pass);

  if(found){

    let now = new Date().getTime();

    if(remember){
      localStorage.setItem("login","true");
      localStorage.setItem("loginTime", now);
    } else {
      sessionStorage.setItem("login","true");
      startIdleTimer(); // 🔥 hanya ini
    }

    document.getElementById("login").style.display = "none";

  } else {
    document.getElementById("error").innerText = "Username atau password salah!";
  }
}
function logout(){
  localStorage.removeItem("login");
  sessionStorage.removeItem("login");

  stopIdleTimer(); // 🔥 penting

  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";

  document.getElementById("login").style.display = "flex";
}
  function showPopup(){
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>
