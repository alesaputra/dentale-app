<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',Arial,sans-serif;
  background: linear-gradient(135deg,#F0F8FF,#E0F2FE,#BAE6FD);
}

/* LOGIN */
#login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  width:100%;
  max-width:360px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.login-input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* APP */
.container{
  display:none;
  max-width:520px;
  margin:auto;
  padding:20px;
  color:#1E293B;
}

.app-header{
  background:#fff;
  padding:16px;
  border-radius:16px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.form-box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
  font-size:13px;
  margin-top:10px;
  display:block;
}

select,input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

.btn-primary{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn-secondary{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#f1f5f9;
  cursor:pointer;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.blue{border-left:5px solid #3b82f6}
.green{border-left:5px solid #22c55e}
.red{border-left:5px solid #ef4444}
.orange{border-left:5px solid orange}

.logout{
  background:#ef4444;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h2>🦷 Dental App</h2>
    <input id="user" class="login-input" placeholder="Username">
    <input id="pass" type="password" class="login-input" placeholder="Password">
    <button onclick="login()" class="btn">Masuk</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="app-header">
    <div>
      <b id="greeting">Halo 👋</b><br>
      <small id="date"></small>
    </div>
    <button onclick="logout()" class="logout">Logout</button>
  </div>

  <div class="form-box">
    <label>Mode Pasien</label>
    <select id="mode" onchange="toggleBB()">
      <option value="dewasa">Dewasa</option>
      <option value="anak">Anak</option>
    </select>

    <label>Berat Badan (Anak)</label>
    <input id="bb" style="display:none" placeholder="20">

    <label>Kategori</label>
    <select id="kategori" onchange="loadObat()">
      <option value="analgesik">Analgesik</option>
      <option value="antibiotik">Antibiotik</option>
      <option value="lain">Lain</option>
    </select>

    <label>Obat</label>
    <select id="obat"></select>

    <button onclick="run()" class="btn-primary">PROSES</button>

    <div class="actions">
      <button onclick="copyResep()" class="btn-secondary">📋 Salin</button>
      <button onclick="resetForm()" class="btn-secondary">🔄 Reset</button>
    </div>
  </div>

  <div id="out"></div>

</div>

<script>
// LOGIN
const users=[
  {username:"dokter",password:"dokter24"},
  {username:"admin",password:"klinik24"},
  {username:"asisten",password:"babu24"}
];

function login(){
  let u=user.value;
  let p=pass.value;
  let found=users.find(x=>x.username===u&&x.password===p);

  if(found){
    login.style.display="none";
    app.style.display="block";
    greeting.innerText="Halo, "+u+" 👋";
    setDate();
    loadObat();
  }else{
    error.innerText="Login salah!";
  }
}

function logout(){
  login.style.display="flex";
  app.style.display="none";
}

function setDate(){
  date.innerText=new Date().toDateString();
}

// DATA OBAT
const data={
analgesik:["Paracetamol","Ibuprofen","Mefenamic Acid","Diclofenac K","Ketorolac","Tramadol"],
antibiotik:["Amoxicillin","Amoxiclav","Cefadroxil","Cefixime","Clindamycin","Metronidazole","Azithromycin"],
lain:["Metylprednisolone","Omeprazole"]
};

let currentResep="";

function toggleBB(){
  bb.style.display=mode.value=="anak"?"block":"none";
}

function loadObat(){
  obat.innerHTML="";
  data[kategori.value].forEach(o=>{
    let opt=document.createElement("option");
    opt.text=o;
    obat.add(opt);
  });
}

function run(){
let modeVal=mode.value;
let bbVal=parseFloat(bb.value||0);
let obatVal=obat.value;

let dosis="",resep="",indikasi="",kontra="",merk="",kie="";

// DEWASA
const dewasa={
"Paracetamol":["500 mg 3-4x","R/ Paracetamol 500 mg\nS: 3 dd 1","Nyeri ringan","Hati","Sanmol","Boleh sebelum/sesudah makan"],
"Ibuprofen":["400 mg 3x","R/ Ibuprofen 400 mg\nS: 3 dd 1 p.c","Inflamasi","Gastritis","Proris","Setelah makan"],
"Mefenamic Acid":["500 mg 3x","R/ Mefenamic acid 500 mg\nS: 3 dd 1","Nyeri sedang","Gastritis","Ponstan","Jangan saat perut kosong"],
"Diclofenac K":["50 mg 2-3x","R/ Diclofenac K 50 mg\nS: 2 dd 1","Nyeri kuat","Ulkus","Cataflam","Setelah makan"],
"Ketorolac":["10 mg 3x","R/ Ketorolac 10 mg\nS: 3 dd 1","Nyeri berat","Ginjal","Toradol","Max 5 hari"],
"Tramadol":["50 mg 2-3x","R/ Tramadol 50 mg\nS: 2 dd 1","Nyeri berat","Ketergantungan","Tramal","Mengantuk"],

"Amoxicillin":["500 mg 3x","R/ Amoxicillin 500 mg\nS: 3 dd 1","Infeksi","Alergi","Amoxil","Habiskan"],
"Amoxiclav":["625 mg 3x","R/ Amoxiclav 625 mg\nS: 3 dd 1","Infeksi berat","Alergi","Augmentin","Setelah makan"],
"Cefadroxil":["500 mg 2x","R/ Cefadroxil 500 mg\nS: 2 dd 1","Infeksi","Alergi","Duricef","Habiskan"],
"Cefixime":["200 mg 2x","R/ Cefixime 200 mg\nS: 2 dd 1","Infeksi berat","Alergi","Suprax","Habiskan"],
"Clindamycin":["300 mg 3x","R/ Clindamycin 300 mg\nS: 3 dd 1","Alergi penisilin","Diare","Dalacin","Stop jika diare"],
"Metronidazole":["500 mg 3x","R/ Metronidazole 500 mg\nS: 3 dd 1","Anaerob","Alkohol","Flagyl","Tidak boleh alkohol"],
"Azithromycin":["500 mg 1x","R/ Azithromycin 500 mg\nS: 1 dd 1","Alternatif","Hati","Zithromax","Sebelum makan"],

"Metylprednisolone":["4 mg 3x","R/ Metylprednisolone 4 mg\nS: 3 dd 1","Inflamasi","Infeksi aktif","Medrol","Jangka pendek"],
"Omeprazole":["20 mg 1x","R/ Omeprazole 20 mg\nS: 1 dd 1 a.c","Gastritis","Hipersensitif","Losec","Sebelum makan"]
};

// ANAK
if(modeVal=="anak" && bbVal>0){
let w=Math.min(bbVal,40);

const anak={
"Paracetamol":[(w*0.5).toFixed(1)+" mL","R/ Paracetamol syr\nS: 3 dd "+(w*0.5).toFixed(1)+" mL","Demam","Hati","Sanmol Syr",""],
"Ibuprofen":[(w*0.25).toFixed(1)+" mL","R/ Ibuprofen syr\nS: 3 dd "+(w*0.25).toFixed(1)+" mL","Nyeri","Gastritis","Proris Syr","Setelah makan"],
"Amoxicillin":[(w*0.4).toFixed(1)+" mL","R/ Amoxicillin syr\nS: 3 dd "+(w*0.4).toFixed(1)+" mL","Infeksi","Alergi","Amoxil Syr","Habiskan"],
"Cefadroxil":[(w*0.6).toFixed(1)+" mL","R/ Cefadroxil syr\nS: 2 dd "+(w*0.6).toFixed(1)+" mL","Infeksi","Alergi","Duricef Syr","Habiskan"],
"Metronidazole":[(w*0.3).toFixed(1)+" mL","R/ Metronidazole syr\nS: 3 dd "+(w*0.3).toFixed(1)+" mL","Anaerob","Alkohol","Flagyl Syr","Hindari alkohol"]
};

if(anak[obatVal]){
[dosis,resep,indikasi,kontra,merk,kie]=anak[obatVal];
}else{
kie="Tidak dianjurkan untuk anak";
}
}

// DEWASA
if(modeVal=="dewasa" && dewasa[obatVal]){
[dosis,resep,indikasi,kontra,merk,kie]=dewasa[obatVal];
}

currentResep=resep;

// OUTPUT
out.innerHTML=`
<div class="card blue"><b>Dosis:</b><br>${dosis}</div>
<div class="card green"><b>Resep:</b><pre>${resep}</pre></div>
<div class="card green"><b>Indikasi:</b><br>${indikasi}</div>
<div class="card red"><b>Kontraindikasi:</b><br>${kontra}</div>
<div class="card blue"><b>Merk:</b><br>${merk}</div>
<div class="card orange"><b>KIE:</b><br>${kie}</div>
`;
}

function copyResep(){
if(!currentResep){alert("Belum ada resep");return;}
navigator.clipboard.writeText(currentResep);
alert("Resep disalin");
}

function resetForm(){
bb.value="";
out.innerHTML="";
currentResep="";
}

window.onload=loadObat;
</script>

</body>
</html>
