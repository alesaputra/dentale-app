<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

#login{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  background:#F0F8FF;
  position:fixed;
  top:0;left:0;width:100%;
  z-index:9999;
  padding:20px;
}

.login-card{
  background:#FFFFFF;
  width:100%;
  max-width:360px;
  padding:32px 24px;
  border-radius:24px;
  box-shadow:0 8px 32px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{font-size:42px;margin-bottom:12px}
.login-card h2{font-size:20px;color:#1E293B;margin-bottom:28px}

.login-input{
  width:100%;
  padding:14px 18px;
  background:#EDF6F9;
  border:2px solid transparent;
  border-radius:16px;
  font-size:15px;
  margin-bottom:12px;
  outline:none;
}

.login-input:focus{
  background:#FFFFFF;
  border-color:#4AB3E6;
}

.btn-masuk{
  width:100%;
  padding:18px;
  background:#4AB3E6;
  border:none;
  border-radius:16px;
  font-size:20px;
  font-weight:600;
  color:#FFFFFF;
  cursor:pointer;
  margin-top:8px;
}

#error{color:#ef4444;font-size:14px;min-height:20px;margin-bottom:8px}

.container{display:none;padding:20px;color:white;text-align:center}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="logo">🦷</div>
    <h2>Dental App</h2>
    <input type="text" id="user" class="login-input" placeholder="Username">
    <input type="password" id="pass" class="login-input" placeholder="Password">
    <div id="error"></div>
    <button onclick="login()" class="btn-masuk">Masuk</button>
  </div>
</div>

<div class="container" id="app">
  <h1>Berhasil Masuk! 🎉</h1>
  <p>Kalau ini muncul, berarti login udah bener.</p>
  <button onclick="logout()" style="margin-top:20px;padding:10px 20px;background:#ef4444;color:white;border:none;border-radius:8px;">Logout</button>
</div>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;
  
  if(user === "dokter" && pass === "dokter24"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Username atau password salah!";
  }
}

function logout(){
  document.getElementById("login").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  document.getElementById("error").innerText = "";
}
</script>
</body>
</html>
