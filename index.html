<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panduan resep dokter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --space-xs: 6px;
  --space-sm: 10px;
  --space-md: 16px;
  --space-lg: 22px;
  --blue-light: #EDF6F9;
  --blue-main: #4AB3E6;
  --blue-dark: #3A9FD1;
}
body {
  font-family: 'Inter', Arial, sans-serif;
  padding:15px;
  min-height:100vh;
  background: radial-gradient(circle at 20% 30%, #38bdf8 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, #6366f1 0%, transparent 40%),
              linear-gradient(135deg, #0f172a, #1e3a8a);
  background-attachment: fixed;
  margin: 0;
}

/* ====== LOGIN SCREEN ====== */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg, #F0F8FF 0%, #FFFFFF 100%);
  position:fixed;
  top:0;left:0;width:100%;
  z-index:9999;
  padding: 20px;
  transition: opacity 0.5s ease, visibility 0.5s;
}

#login.fade-out {
  opacity: 0;
  visibility: hidden;
}

.login-card {
  background: #FFFFFF;
  width: 100%;
  max-width: 360px;
  padding: 32px 24px;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  text-align: center;
  transition: transform 0.4s ease;
}

.login-card.success {
  transform: scale(0.95);
}

.logo {
  width: 48px;
  height: 48px;
  margin: 0 auto 12px;
}

.login-card h2 {
  font-size: 20px;
  font-weight: 500;
  color: #1E293B;
  margin-bottom: 28px;
}

.login-input-group {
  position: relative;
  margin-bottom: 12px;
}

.login-input {
  width: 100%;
  padding: 14px 44px 14px 18px;
  background: var(--blue-light);
  border: 2px solid transparent;
  border-radius: 16px;
  font-size: 15px;
  color: #334155;
  outline: none;
  transition: all 0.2s ease;
  box-sizing: border-box;
}

.login-input::placeholder { color: #64748B; }

.login-input:hover {
  background: #E0F2FE;
  transform: translateY(-1px);
}

.login-input:focus {
  background: #FFFFFF;
  border-color: var(--blue-main);
  box-shadow: 0 0 0 4px rgba(74, 179, 230, 0.15);
}

.input-icon {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  fill: #64748B;
  transition: fill 0.2s;
}

.login-input:focus ~.input-icon {
  fill: var(--blue-main);
}

.remember-box {
  width: 100%;
  padding: 14px 18px;
  background: var(--blue-light);
  border-radius: 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: flex-start;
  transition: background 0.2s;
  box-sizing: border-box;
}

.remember-box:hover {
  background: #E0F2FE;
}

.remember-box input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--blue-main);
  cursor: pointer;
}

.remember-box label {
  font-size: 14px;
  color: #334155;
  cursor: pointer;
  margin: 0;
}

.btn-masuk {
  width: 100%;
  padding: 18px;
  background: var(--blue-main);
  border: none;
  border-radius: 16px;
  font-size: 20px;
  font-weight: 600;
  color: #FFFFFF;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-masuk:hover {
  background: var(--blue-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(74, 179, 230, 0.3);
}

.btn-masuk:active {
  transform: translateY(0px);
}

#error {
  color: #ef4444;
  font-size: 14px;
  margin-top: -8px;
  margin-bottom: 16px;
  min-height: 20px;
}

.success-check {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 80px;
  height: 80px;
  background: var(--blue-main);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
}

.success-check.show {
  animation: popIn 0.5s ease forwards;
}

.success-check svg {
  width: 40px;
  height: 40px;
  stroke: white;
  stroke-width: 3;
  fill: none;
}

@keyframes popIn {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* ====== APP UTAMA ====== */
.container {
  max-width:520px;
  margin:auto;
  color:white;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.form-box {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  padding: var(--space-lg);
  border-radius:16px;
  margin-top:15px;
}
h2 {
  text-align:center;
  color:white;
}
select,input:not(.login-input) {
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  font-size:15px;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.95);
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
  box-sizing: border-box;
}
button:not(.btn-masuk):not(.logout-btn) {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  font-size:15px;
  border:none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition: all 0.2s ease;
}
button:hover:not(.btn-masuk):not(.logout-btn) {
  transform: scale(1.05);
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
button:active { transform: scale(0.97); }
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  color:#111;
  animation: slideUp 0.4s ease;
}
.blue{border-left:6px solid #007bff;}
.green{border-left:6px solid #28a745;}
.red{border-left:6px solid #dc3545;}
.orange{border-left:6px solid orange;}
.hidden{display:none;}
pre{white-space:pre-wrap;}
label {
  font-size:13px;
  margin-top:10px;
  display:block;
  color:#e2e8f0;
}
.logout-btn {
  position:absolute;
  top:15px;
  right:15px;
  background:#ef4444;
  color:white;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  font-size:12px;
  width:auto;
  cursor:pointer;
}
.logout-btn:hover { background:#dc2626; }
.form-group { margin-bottom: var(--space-md); }
#out { margin-top: var(--space-lg); }

@keyframes slideUp {
  from { opacity:0; transform:translateY(15px); }
  to { opacity:1; transform:translateY(0); }
}

@media (max-width: 768px) {
.container { max-width:90%; }
  body { padding:10px; }
  h2 { font-size:18px; }
}

#popup {
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#popup div {
  background:white;
  padding:25px;
  border-radius:16px;
  text-align:center;
  width:280px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from {opacity:0; transform:scale(0.8);}
  to {opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="login-card" id="loginCard">
    <div class="logo">
      <!-- LOGO GIGI YANG UDAH BENER -->
      <svg viewBox="0 0 24 24" fill="#4AB3E6">
        <path d="M12 2c-3.3 0-6 2.2-6 5c0 1.7 3.1 1.7 4.1c1.9 1.8 2.3 1.8 3.9c0 2.1 1 3.5 3.5s3.5-1.4 3.5-3.5c0-1.6.8-3 1.8-3.9c1-1 1.7-2.4 1.7-4.1c0-2.8-2.7-5-6-5z"/>
      </svg>
    </div>
    
    <h2>Dental App</h2>
    
    <div class="login-input-group">
      <input type="text" id="user" class="login-input" placeholder="Username">
      <svg class="input-icon" viewBox="0 0 24 24">
        <path d="M12 1C8.962 1 6.5 3.462 6.5 6.5C6.5 9.538 8.962 12 12 12C15.038 12 17.5 9.538 17.5 6.5C17.5 3.462 15.038 1 12 1ZM12 14C7.582 14 4 17.582 4 22H20C20 17.582 16.418 14 12 14Z"/>
      </svg>
    </div>
    
    <div class="login-input-group">
      <input type="password" id="pass" class="login-input" placeholder="Password">
      <svg class="input-icon" viewBox="0 0 24 24">
        <path d="M18 8H17V6C17 3.24 14.76 1 12 1S7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM12 17C10.9 17 10 16.1 10 15S10.9 13 12 13S14 13.9 14 15S13.1 17 12 17ZM15.1 8H8.9V6C8.9 4.29 10.29 2.9 12 2.9S15.1 4.29 15.1 6V8Z"/>
      </svg>
    </div>
    
    <div class="remember-box">
      <input type="checkbox" id="remember">
      <label for="remember">Tetap login</label>
    </div>
    
    <div id="error"></div>
    <button onclick="login()" class="btn-masuk">Masuk</button>
    
    <div class="success-check" id="successCheck">
      <svg viewBox="0 0 24 24">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
  </div>
</div>

<!-- APP UTAMA -->
<div class="container">
<h2 style="letter-spacing:1px;">🦷 Dentale Smart Resep</h2>
<p style="text-align:center; font-size:12px; opacity:0.7;">
  Sistem bantu resep cepat & praktis
</p>
  <div class="form-box">
<div style="display:flex; justify-content:flex-end;">
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<label>Mode Pasien</label>
<select id="mode" onchange="toggleBB()">
<option value="dewasa">Dewasa</option>
<option value="anak">Anak</option>
</select>

<div class="form-group">
  <label>Berat Badan (Mode Pasien Anak)</label>
  <input id="bb" class="hidden" placeholder="Contoh: 20 (Kg)">
</div>

<label>Kategori Obat</label>
<select id="kategori">
<option value="analgesik">Analgesik</option>
<option value="antibiotik">Antibiotik</option>
<option value="lain">Lain-lain</option>
</select>

<label>Pilih Obat</label>
<select id="obat"></select>

<button onclick="run()">PROSES</button>

<div id="out"></div>
</div>

<div id="popup">
  <div>
    <h3>⏰ Session Expired</h3>
    <p>Silakan login kembali</p>
    <button onclick="closePopup()" style="margin-top:10px;padding:10px;width:100%;background:#ef4444;color:white;border:none;border-radius:10px;">OK</button>
  </div>
</div>

<script>
const data = {
analgesik: ["Paracetamol","Ibuprofen","Mefenamic Acid","Diclofenac K","Ketorolac","Tramadol"],
antibiotik: ["Amoxicillin","Amoxiclav","Cefadroxil","Cefixime","Clindamycin","Metronidazole","Azithromycin"],
lain: ["Metylprednisolone","Omeprazole"]
};

function toggleBB(){
let mode=document.getElementById("mode").value;
let bb=document.getElementById("bb");
mode=="anak"? bb.classList.remove("hidden") : bb.classList.add("hidden");
}

function loadObat(){
let kat=document.getElementById("kategori").value;
let select=document.getElementById("obat");
select.innerHTML="";
data[kat].forEach(o=>{
let opt=document.createElement("option");
opt.text=o;
select.add(opt);
});
}

document.getElementById("kategori").addEventListener("change",loadObat);

function run(){
let mode=document.getElementById("mode").value;
let bb=parseFloat(document.getElementById("bb").value || 0);
let obat=document.getElementById("obat").value;
let dosis="",resep="",indikasi="",kontra="",merk="",kie="";

const dewasa = {
"Paracetamol":["500 mg 3-4x","R/ Paracetamol 500 mg\nS: 3 dd 1","Nyeri ringan","Hati","Sanmol","Boleh sebelum/sesudah makan"],
"Ibuprofen":["400 mg 3x","R/ Ibuprofen 400 mg\nS: 3 dd 1 p.c","Inflamasi","Gastritis","Proris","Setelah makan"],
"Mefenamic Acid":["500 mg 3x","R/ Mefenamic acid 500 mg\nS: 3 dd 1","Nyeri sedang","Gastritis","Ponstan","Jangan saat perut kosong"],
"Diclofenac K":["50 mg 2-3x","R/ Diclofenac K 50 mg\nS: 2 dd 1","Nyeri kuat","Ulkus","Cataflam","Setelah makan"],
"Ketorolac":["10 mg 3x","R/ Ketorolac 10 mg\nS: 3 dd 1","Nyeri berat","Ginjal","Toradol","Max 5 hari"],
"Tramadol":["50 mg 2-3x","R/ Tramadol 50 mg\nS: 2 dd 1","Nyeri berat","Ketergantungan","Tramal","Mengantuk"],
"Amoxicillin":["500 mg 3x","R/ Amoxicillin 500 mg\nS: 3 dd 1","Infeksi","Alergi","Amoxil","Habiskan"],
"Amoxiclav":["625 mg 3x","R/ Amoxiclav 625 mg\nS: 3 dd 1","Infeksi berat","Alergi","Augmentin","Setelah makan"],
"Cefadroxil":["500 mg 2x","R/ Cefadroxil 500 mg\nS: 2 dd 1","Infeksi","Alergi","Duricef","Habiskan"],
"Cefixime":["200 mg 2x","R/ Cefixime 200 mg\nS: 2 dd 1","Infeksi berat","Alergi","Suprax","Habiskan"],
"Clindamycin":["300 mg 3x","R/ Clindamycin 300 mg\nS: 3 dd 1","Alergi penisilin","Diare","Dalacin","Stop jika diare"],
"Metronidazole":["500 mg 3x","R/ Metronidazole 500 mg\nS: 3 dd 1","Anaerob","Alkohol","Flagyl","Tidak boleh alkohol"],
"Azithromycin":["500 mg 1x","R/ Azithromycin 500 mg\nS: 1 dd 1","Alternatif","Hati","Zithromax","Sebelum makan"],
"Metylprednisolone":["4 mg 3x","R/ Metylprednisolone 4 mg\nS: 3 dd 1","Inflamasi","Infeksi aktif","Medrol","Jangka pendek"],
"Omeprazole":["20 mg 1x","R/ Omeprazole 20 mg\nS: 1 dd 1 a.c","Gastritis","Hipersensitif","Losec","Sebelum makan"]
};

const maxBB = 40;
if(mode=="anak" && bb>0){
let w = bb>maxBB? maxBB : bb;
let over = bb>maxBB;
const anak = {
"Paracetamol":[(w*0.5).toFixed(1)+" mL","R/ Paracetamol syr\nS: 3 dd "+(w*0.5).toFixed(1)+" mL","Demam","Hati","Sanmol Syr",""],
"Ibuprofen":[(w*0.25).toFixed(1)+" mL","R/ Ibuprofen syr\nS: 3 dd "+(w*0.25).toFixed(1)+" mL","Nyeri","Gastritis","Proris Syr","Setelah makan"],
"Amoxicillin":[(w*0.4).toFixed(1)+" mL","R/ Amoxicillin syr\nS: 3 dd "+(w*0.4).toFixed(1)+" mL","Infeksi","Alergi","Amoxil Syr","Habiskan"],
"Cefadroxil":[(w*0.6).toFixed(1)+" mL","R/ Cefadroxil syr\nS: 2 dd "+(w*0.6).toFixed(1)+" mL","Infeksi","Alergi","Duricef Syr","Habiskan"],
"Metronidazole":[(w*0.3).toFixed(1)+" mL","R/ Metronidazole syr\nS: 3 dd "+(w*0.3).toFixed(1)+" mL","Anaerob","Alkohol","Flagyl Syr","Hindari alkohol"]
};
if(anak){
[dosis,resep,indikasi,kontra,merk,kie]=anak;
if(over) kie="BB > 40 kg → gunakan dosis maksimal anak";
}else{
dosis="-"; resep="-"; indikasi="-"; kontra="-"; merk="-"; kie="Tidak dianjurkan untuk anak";
}
}
if(mode=="dewasa" && dewasa){
[dosis,resep,indikasi,kontra,merk,kie]=dewasa;
}
document.getElementById("out").innerHTML=`
<div class="card blue"><b>Dosis:</b><br>${dosis}</div>
<div class="card green"><b>Resep:</b><pre>${resep}</pre></div>
<div class="card green"><b>Indikasi:</b><br>${indikasi}</div>
<div class="card red"><b>Kontraindikasi:</b><br>${kontra}</div>
<div class="card orange"><b>Merk:</b><br>${merk}</div>
<div class="card blue"><b>NB (KIE):</b><br>${kie}</div>
`;
}

let idleTimer;
function startIdleTimer(){
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    logout();
    showPopup();
  }, 10 * 60 * 1000);
}
function stopIdleTimer(){ clearTimeout(idleTimer); }
window.onload = function(){
  toggleBB();
  loadObat();
  let isLogin = localStorage.getItem("login");
  let loginTime = localStorage.getItem("loginTime");
  if(isLogin === "true" && loginTime){
    let now = new Date().getTime();
    let diff = now - loginTime;
    let batas = 24 * 60 * 60 * 1000;
    if(diff < batas){
      document.getElementById("login").style.display = "none";
    } else {
      localStorage.removeItem("login");
      localStorage.removeItem("loginTime");
      document.getElementById("login").style.display = "flex";
      showPopup();
    }
  }
  if(sessionStorage.getItem("login") === "true"){
    document.getElementById("login").style.display = "none";
    startIdleTimer();
  }
};
const users = [
  {username: "dokter", password: "dokter24"},
  {username: "admin", password: "klinik24"},
  {username: "asisten", password: "babu24"}
];

function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;
  let remember = document.getElementById("remember").checked;
  let found = users.find(u => u.username === user && u.password === pass);
  
  if(found){
    document.getElementById("loginCard").classList.add("success");
    document.getElementById("successCheck").classList.add("show");
    
    setTimeout(() => {
      let now = new Date().getTime();
      if(remember){
        localStorage.setItem("login","true");
        localStorage.setItem("loginTime", now);
      } else {
        sessionStorage.setItem("login","true");
        startIdleTimer();
      }
      document.getElementById("login").classList.add("fade-out");
      setTimeout(() => {
        document.getElementById("login").style.display = "none";
      }, 500);
    }, 800);
    
  } else {
    document.getElementById("error").innerText = "Username atau password salah!";
    document.getElementById("loginCard").style.animation = "shake 0.4s";
    setTimeout(() => {
      document.getElementById("loginCard").style.animation = "";
    }, 400);
  }
}

function logout(){
  localStorage.removeItem("login");
  sessionStorage.removeItem("login");
  stopIdleTimer();
  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
  document.getElementById("login").style.display = "flex";
  document.getElementById("login").classList.remove("fade-out");
  document.getElementById("loginCard").classList.remove("success");
  document.getElementById("successCheck").classList.remove("show");
}
function showPopup(){ document.getElementById("popup").style.display = "flex"; }
function closePopup(){ document.getElementById("popup").style.display = "none"; }
</script>
</body>
</html>
