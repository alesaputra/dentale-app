/* ====== APP BERWARNA ====== */
.container{
  display:none;
  max-width:520px;
  margin:auto;
  background:linear-gradient(180deg,#F0F8FF 0%,#FFFFFF 100%);
  min-height:100vh;
  padding:20px;
  padding-top:0;
}

.app-header{
  background:linear-gradient(135deg,#4AB3E6,#6366f1);
  padding:20px;
  border-radius:0 0 24px 24px;
  margin:0 -20px 20px -20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 20px rgba(74,179,230,0.3);
  position:relative;
  overflow:hidden;
}

.app-header::before{
  content:'';
  position:absolute;
  top:-50%;right:-10%;
  width:200px;height:200px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

.app-header h3{font-size:18px;font-weight:700;margin-bottom:2px;color:white;position:relative}
.app-header p{font-size:12px;color:rgba(255,255,255,0.9);position:relative}

.avatar{
  width:44px;height:44px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,0.4);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
  color:white;
  position:relative;
}

.hero-card{
  background:linear-gradient(135deg,#FFFFFF,#F0F8FF);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.06);
  text-align:center;
  position:relative;
  overflow:hidden;
}

.hero-card::after{
  content:'🦷';
  position:absolute;
  font-size:80px;
  opacity:0.05;
  right:10px;
  bottom:-10px;
}

.hero-card h4{
  font-size:16px;
  color:#1E293B;
  margin-bottom:6px;
  font-weight:600;
}

.hero-card p{
  font-size:13px;
  color:#64748B;
}

.form-box{
  background:#FFFFFF;
  padding:22px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 4px 16px rgba(0,0,0,0.06);
  border:1px solid #F1F5F9;
}

.section-title{
  font-size:14px;
  font-weight:700;
  color:#1E293B;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}

.badge{
  display:inline-block;
  padding:3px 10px;
  border-radius:8px;
  font-size:11px;
  font-weight:600;
  background:#EDF6F9;
  color:#4AB3E6;
}

select,input:not(.login-input){
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  font-size:15px;
  border:2px solid #E2E8F0;
  outline:none;
  background:#FFFFFF;
  color:#334155;
  transition:all 0.3s;
  cursor:pointer;
}

select:hover,input:not(.login-input):hover{
  border-color:#CBD5E1;
}
