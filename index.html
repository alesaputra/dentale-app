<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',Arial,sans-serif;
  background: linear-gradient(135deg,#F0F8FF,#E0F2FE,#BAE6FD);
  min-height:100vh;
}

/* LOGIN */
#login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-card{
  background:#FFFFFF;
  padding:30px;
  width:100%;
  max-width:360px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

.login-card h2{
  margin-bottom:20px;
  color:#1E293B;
}

.login-input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#error{
  color:red;
  margin-top:10px;
  min-height:20px;
}

/* APP */
.container{
  display:none;
  max-width:520px;
  margin:auto;
  padding:20px;
  color:#1E293B;
}

.app-header{
  background:#FFFFFF;
  padding:16px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.form-box{
  background:#FFFFFF;
  padding:20px;
  border-radius:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
  font-size:13px;
  margin-top:10px;
  display:block;
  color:#334155;
}

select,input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

.btn-primary{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.card{
  background:#FFFFFF;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.blue{border-left:5px solid #3b82f6}
.green{border-left:5px solid #22c55e}

.logout{
  background:#ef4444;
  color:white;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h2>🦷 Dental App</h2>
    <input id="user" class="login-input" placeholder="Username">
    <input id="pass" type="password" class="login-input" placeholder="Password">
    <button onclick="login()" class="btn">Masuk</button>
    <div id="error"></div>
  </div>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="app-header">
    <div>
      <b id="greeting">Halo, Dokter 👋</b><br>
      <small id="date"></small>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="form-box">
    <label>Mode Pasien</label>
    <select id="mode" onchange="toggleBB()">
      <option value="dewasa">Dewasa</option>
      <option value="anak">Anak</option>
    </select>

    <label>Berat Badan (Anak)</label>
    <input id="bb" style="display:none" placeholder="20">

    <label>Kategori</label>
    <select id="kategori" onchange="loadObat()">
      <option value="analgesik">Analgesik</option>
      <option value="antibiotik">Antibiotik</option>
    </select>

    <label>Obat</label>
    <select id="obat"></select>

    <button onclick="run()" class="btn-primary">PROSES</button>
  </div>

  <div id="out"></div>

</div>

<script>
// USER LOGIN
const users = [
  {username:"dokter", password:"dokter24"},
  {username:"admin", password:"klinik24"},
  {username:"asisten", password:"babu24"}
];

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let found = users.find(user => user.username === u && user.password === p);

  if(found){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("greeting").innerText = "Halo, " + u + " 👋";
    setDate();
    loadObat();
  } else {
    document.getElementById("error").innerText="Username atau password salah!";
  }
}

function logout(){
  document.getElementById("login").style.display="flex";
  document.getElementById("app").style.display="none";
}

// DATE
function setDate(){
  let d = new Date();
  document.getElementById("date").innerText = d.toDateString();
}

// DATA OBAT
const data={
analgesik:["Paracetamol","Ibuprofen"],
antibiotik:["Amoxicillin"]
};

function toggleBB(){
  let mode=document.getElementById("mode").value;
  document.getElementById("bb").style.display = mode=="anak"?"block":"none";
}

function loadObat(){
  let kat=document.getElementById("kategori").value;
  let select=document.getElementById("obat");
  select.innerHTML="";
  data[kat].forEach(o=>{
    let opt=document.createElement("option");
    opt.text=o;
    select.add(opt);
  });
}

function run(){
  document.getElementById("out").innerHTML=`
    <div class="card blue"><b>Dosis:</b> 500 mg</div>
    <div class="card green"><b>Resep:</b> Obat diberikan sesuai indikasi</div>
  `;
}

window.onload=function(){
  loadObat();
};
</script>

</body>
</html>
