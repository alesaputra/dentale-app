}

/* ====== LOGIN SCREEN ====== */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  background: linear-gradient(180deg, #F0F8FF 0%, #FFFFFF 100%);
  position:fixed;
  top:0;left:0;width:100%;
  z-index:9999;
  padding: 20px;
  transition: opacity 0.5s ease, visibility 0.5s;
}

#login.fade-out { opacity: 0; visibility: hidden; }

.login-card {
  background: #FFFFFF;
  width: 100%;
  max-width: 360px;
  padding: 32px 24px;
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  text-align: center;
  transition: transform 0.4s ease;
}

.login-card.success { transform: scale(0.95); }

.logo {
  width: 48px;
  height: 48px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
}

.login-card h2 {
  font-size: 20px;
  font-weight: 500;
  color: #1E293B;
  margin-bottom: 28px;
}

.login-input-group {
  position: relative;
  margin-bottom: 12px;
}

.login-input {
  width: 100%;
  padding: 14px 44px 14px 18px;
  background: var(--blue-light);
  border: 2px solid transparent;
  border-radius: 16px;
  font-size: 15px;
  color: #334155;
  outline: none;
  transition: all 0.2s ease;
}

.login-input::placeholder { color: #64748B; }
.login-input:hover { background: #E0F2FE; transform: translateY(-1px); }
.login-input:focus {
  background: #FFFFFF;
  border-color: var(--blue-main);
  box-shadow: 0 0 0 4px rgba(74, 179, 230, 0.15);
}

.input-icon {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  fill: #64748B;
  transition: fill 0.2s;
}

.login-input:focus ~.input-icon { fill: var(--blue-main); }

.remember-box {
  width: 100%;
  padding: 14px 18px;
  background: var(--blue-light);
  border-radius: 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: flex-start;
  transition: background 0.2s;
}

.remember-box:hover { background: #E0F2FE; }
.remember-box input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--blue-main);
  cursor: pointer;
}
.remember-box label {
  font-size: 14px;
  color: #334155;
  cursor: pointer;
  margin: 0;
}

.btn-masuk {
  width: 100%;
  padding: 18px;

  border: none;
  border-radius: 16px;
  font-size: 20px;
  font-weight: 600;
  color: #FFFFFF;
  cursor: pointer;
  transition: all 0.2s;
}
